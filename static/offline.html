<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DentVoice AI Offline</title>
  <style>
    :root {
      --ink: #1f2937;
      --muted: #6b7280;
      --accent: #146c78;
      --brand: #c96b3b;
      --bg: #f7efe5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Manrope, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(20,108,120,0.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(201,107,59,0.16), transparent 24%),
        linear-gradient(180deg, #fffaf5 0%, var(--bg) 100%);
    }
    .card {
      width: min(560px, 100%);
      padding: 32px;
      border-radius: 28px;
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(148,163,184,0.18);
      box-shadow: 0 24px 60px rgba(78, 50, 29, 0.12);
    }
    .badge {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(20,108,120,0.08);
      color: var(--accent);
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
      font-size: .82rem;
    }
    h1 {
      margin: 16px 0 10px;
      font-size: clamp(2rem, 6vw, 3.4rem);
      line-height: .98;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <article class="card">
    <span class="badge">Offline Mode</span>
    <h1>DentVoice AI is temporarily offline.</h1>
    <p>The app shell is still installed, but this page needs a connection to load fresh workspace data.</p>
    <p>When you’re back online, reopen DentVoice and your latest dashboard, leads, and reporting views will load again.</p>
  </article>
</body>
</html>
